<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img" aria-label="Exemplo de loja virtual completa com banner, filtros e grade de produtos">
  <defs>
    <linearGradient id="phoneA" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#3affff"/><stop offset=".5" stop-color="#7d4dff"/><stop offset="1" stop-color="#ff3d7f"/></linearGradient>
    <linearGradient id="phoneB" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffb000"/><stop offset=".55" stop-color="#ff4b2b"/><stop offset="1" stop-color="#2f6bff"/></linearGradient>
    <linearGradient id="phoneC" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#2d315e"/><stop offset=".48" stop-color="#00d4ff"/><stop offset="1" stop-color="#75ff6a"/></linearGradient>
    <linearGradient id="banner" x1="0" x2="1"><stop stop-color="#151515"/><stop offset="1" stop-color="#303030"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity=".28"/></filter>
