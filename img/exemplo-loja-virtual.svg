  <g transform="translate(610 134)">
    <rect width="286" height="284" rx="22" fill="#0d130f" stroke="#00ff88"/>
    <text x="24" y="38" fill="#f5fff9" font-family="Arial, sans-serif" font-size="22" font-weight="900">Pedido do cliente</text>
    <text x="24" y="64" fill="#9fb0a7" font-family="Arial, sans-serif" font-size="13">Resumo pronto para enviar no WhatsApp</text>
    <line x1="24" y1="84" x2="262" y2="84" stroke="#24382e"/>
    <text x="24" y="116" fill="#f5fff9" font-family="Arial, sans-serif" font-size="15" font-weight="800">Tênis Runner</text>
    <text x="202" y="116" fill="#00ff88" font-family="Arial, sans-serif" font-size="15" font-weight="900">R$149,90</text>
    <text x="24" y="148" fill="#f5fff9" font-family="Arial, sans-serif" font-size="15" font-weight="800">Sandália Casual</text>
    <text x="210" y="148" fill="#00ff88" font-family="Arial, sans-serif" font-size="15" font-weight="900">R$79,90</text>
    <rect x="24" y="176" width="238" height="38" rx="12" fill="#111b15" stroke="#24382e"/>
    <text x="40" y="201" fill="#aebdb5" font-family="Arial, sans-serif" font-size="13">Entrega: bairro do cliente</text>
    <text x="24" y="244" fill="#f5fff9" font-family="Arial, sans-serif" font-size="20" font-weight="900">Total: R$ 229,80</text>
    <rect x="24" y="258" width="238" height="0" fill="none"/>
    <rect x="24" y="228" width="238" height="42" rx="21" transform="translate(0 28)" fill="url(#accent)"/>
    <text x="75" y="282" fill="#06100d" font-family="Arial, sans-serif" font-size="15" font-weight="900">Finalizar pelo WhatsApp</text>
