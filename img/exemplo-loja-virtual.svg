  <g transform="translate(64 134)">
    <rect width="500" height="74" rx="20" fill="#101713" stroke="#1f4031"/>
    <text x="24" y="34" fill="#f5fff9" font-family="Arial, sans-serif" font-size="26" font-weight="900">Tênis, sandálias e sapatos em oferta</text>
    <text x="24" y="58" fill="#aebdb5" font-family="Arial, sans-serif" font-size="15">Cliente escolhe o produto, vê preço e chama no WhatsApp.</text>

    <g transform="translate(0 102)">
      <rect width="150" height="180" rx="18" fill="#111713" stroke="#244133"/>
      <rect x="16" y="15" width="118" height="76" rx="14" fill="url(#shoe1)"/>
      <path d="M38 65c30-24 55-27 78 3 5 7 1 16-8 16H43c-15 0-18-9-5-19z" fill="#f5fff9" opacity=".9"/>
      <text x="16" y="120" fill="#f5fff9" font-family="Arial, sans-serif" font-size="15" font-weight="900">Tênis Runner</text>
      <text x="16" y="142" fill="#9fb0a7" font-family="Arial, sans-serif" font-size="12">Numeração 38-43</text>
      <text x="16" y="170" fill="#00ff88" font-family="Arial, sans-serif" font-size="19" font-weight="900">R$ 149,90</text>
    </g>

    <g transform="translate(172 102)">
      <rect width="150" height="180" rx="18" fill="#111713" stroke="#244133"/>
      <rect x="16" y="15" width="118" height="76" rx="14" fill="url(#shoe2)"/>
      <path d="M35 74c24-13 47-12 76-1 9 4 8 15-2 15H42c-15 0-19-8-7-14z" fill="#f5fff9" opacity=".9"/>
      <path d="M72 48h39v22H72z" fill="#111713"/>
      <text x="16" y="120" fill="#f5fff9" font-family="Arial, sans-serif" font-size="15" font-weight="900">Sapato Social</text>
      <text x="16" y="142" fill="#9fb0a7" font-family="Arial, sans-serif" font-size="12">Couro sintético</text>
      <text x="16" y="170" fill="#00ff88" font-family="Arial, sans-serif" font-size="19" font-weight="900">R$ 199,90</text>
    </g>

    <g transform="translate(344 102)">
      <rect width="150" height="180" rx="18" fill="#111713" stroke="#244133"/>
      <rect x="16" y="15" width="118" height="76" rx="14" fill="url(#shoe3)"/>
      <path d="M35 78h78c10 0 12 11 2 14H36c-12-2-12-12-1-14z" fill="#f5fff9" opacity=".9"/>
      <path d="M50 54h44c12 0 25 9 25 24H50z" fill="#111713"/>
      <text x="16" y="120" fill="#f5fff9" font-family="Arial, sans-serif" font-size="15" font-weight="900">Sandália Casual</text>
      <text x="16" y="142" fill="#9fb0a7" font-family="Arial, sans-serif" font-size="12">Entrega no bairro</text>
      <text x="16" y="170" fill="#00ff88" font-family="Arial, sans-serif" font-size="19" font-weight="900">R$ 79,90</text>
