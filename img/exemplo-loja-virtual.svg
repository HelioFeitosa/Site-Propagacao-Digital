<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img" aria-label="Exemplo realista de loja virtual com vitrine de produtos, preços e carrinho">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#08100d"/>
      <stop offset=".54" stop-color="#0d1512"/>
      <stop offset="1" stop-color="#111b10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#00ff88"/>
      <stop offset="1" stop-color="#a8ff00"/>
    </linearGradient>
    <linearGradient id="shoe1" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#1c294f"/>
      <stop offset="1" stop-color="#00d889"/>
    </linearGradient>
    <linearGradient id="shoe2" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#4d205b"/>
      <stop offset="1" stop-color="#00c8ff"/>
    </linearGradient>
    <linearGradient id="shoe3" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#6d4318"/>
      <stop offset="1" stop-color="#baff00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="960" height="480" rx="30" fill="url(#bg)"/>
  <rect x="38" y="32" width="884" height="416" rx="28" fill="#070b09" stroke="#1f5138" filter="url(#shadow)"/>

  <g transform="translate(64 56)">
    <rect width="832" height="54" rx="17" fill="#101713" stroke="#223d31"/>
    <circle cx="28" cy="27" r="14" fill="url(#accent)"/>
    <text x="50" y="34" fill="#f5fff9" font-family="Arial, sans-serif" font-size="20" font-weight="900">Loja de Calçados</text>
    <text x="238" y="33" fill="#aebdb5" font-family="Arial, sans-serif" font-size="13" font-weight="700">Masculino</text>
    <text x="325" y="33" fill="#aebdb5" font-family="Arial, sans-serif" font-size="13" font-weight="700">Feminino</text>
    <text x="404" y="33" fill="#aebdb5" font-family="Arial, sans-serif" font-size="13" font-weight="700">Ofertas</text>
    <rect x="588" y="12" width="132" height="30" rx="15" fill="#0d130f" stroke="#2b4a39"/>
    <text x="612" y="32" fill="#9fb0a7" font-family="Arial, sans-serif" font-size="12">Buscar produto</text>
    <rect x="736" y="10" width="76" height="34" rx="17" fill="url(#accent)"/>
    <text x="755" y="32" fill="#06100d" font-family="Arial, sans-serif" font-size="13" font-weight="900">Carrinho</text>
