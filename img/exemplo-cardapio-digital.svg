    <linearGradient id="a" x1="0" x2="1"><stop stop-color="#00ff88"/><stop offset="1" stop-color="#b6ff00"/></linearGradient>
  </defs>
  <rect width="960" height="620" rx="34" fill="url(#bg)"/>
  <rect x="116" y="46" width="344" height="528" rx="38" fill="#080c0a" stroke="#244934" stroke-width="3"/>
